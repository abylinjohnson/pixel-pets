<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reminders · Pixel Pets</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-avatar">
        <img src="{{ url_for('assets', filename='nila/sit-idle-tail/sitidletail1.png') }}" alt="Nila">
        <span class="brand-status" aria-hidden="true"></span>
      </div>
      <div class="brand-text">
        <strong>Pixel Pets</strong>
        <span>Focus companion</span>
      </div>
    </div>

    <nav class="nav" aria-label="Main navigation">
      <div class="nav-section">Main</div>
      <a href="/">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="6" height="6" rx="1.5" />
          <rect x="10" y="2" width="6" height="6" rx="1.5" />
          <rect x="2" y="10" width="6" height="6" rx="1.5" />
          <rect x="10" y="10" width="6" height="6" rx="1.5" />
        </svg>
        Overview
      </a>
      <a href="/focus">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="9" r="6.5" />
          <circle cx="9" cy="9" r="2.5" />
        </svg>
        Focus Session
      </a>
      <a class="active" href="/reminders">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 2a5 5 0 00-5 5v2.5L2.5 12h13L14 9.5V7a5 5 0 00-5-5z" />
          <path d="M7.5 14.5a1.5 1.5 0 003 0" />
        </svg>
        Reminders
      </a>
      <a href="/events">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="9" r="6.5" />
          <polyline points="9 5.5 9 9 11.5 10.5" />
        </svg>
        Event Logs
      </a>
      <div class="nav-section">Coming soon</div>

      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 6l7-3.5L16 6v.5L9 10 2 6.5V6z" />
          <path d="M2 10l7 3.5 7-3.5M2 13.5l7 3.5 7-3.5" />
        </svg>
        Infinite Memory
        <span class="nav-badge">Soon</span>
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5" cy="5" r="2" />
          <circle cx="13" cy="5" r="2" />
          <circle cx="9" cy="14" r="2" />
          <line x1="7" y1="5" x2="11" y2="5" />
          <line x1="6" y1="7" x2="8" y2="12" />
          <line x1="12" y1="7" x2="10" y2="12" />
        </svg>
        Multiagent Model
        <span class="nav-badge">Soon</span>
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 4 2 9 6 14" />
          <polyline points="12 4 16 9 12 14" />
        </svg>
        API Integration
        <span class="nav-badge">Soon</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <p class="sidebar-version">Pixel Pets · v0.1</p>
    </div>
  </aside>

  <main class="shell">
    <div class="reminder-page-hero">
      <h1>Reminders</h1>
      <p>Nila will nudge you when the time comes.</p>
    </div>

    <div class="reminders-layout">

      <!-- ── Add form ────────────────────────────────────────── -->
      <div class="panel reminder-form-panel">
        <div class="reminder-form-inner">

          <!-- Once / Recurring toggle -->
          <div class="type-tabs">
            <button class="type-tab active" id="tabOnce">Once</button>
            <button class="type-tab" id="tabRecurring">Recurring</button>
          </div>

          <!-- Big time picker -->
          <div class="time-input-wrap">
            <input type="time" class="time-input-big" id="reminderTime" value="09:00">
          </div>

          <!-- Once: date selector -->
          <div id="onceOptions">
            <label class="field-label" for="reminderDate">Date</label>
            <input type="date" class="date-input" id="reminderDate">
          </div>

          <!-- Recurring: day-of-week chips -->
          <div id="recurringOptions" hidden>
            <label class="field-label">Repeat on</label>
            <div class="day-chips">
              <button class="day-chip" data-day="0">Mo</button>
              <button class="day-chip" data-day="1">Tu</button>
              <button class="day-chip" data-day="2">We</button>
              <button class="day-chip" data-day="3">Th</button>
              <button class="day-chip" data-day="4">Fr</button>
              <button class="day-chip" data-day="5">Sa</button>
              <button class="day-chip" data-day="6">Su</button>
            </div>
          </div>

          <!-- Label -->
          <div>
            <label class="field-label" for="reminderLabel">Label</label>
            <input type="text" class="reminder-label-input" id="reminderLabel" placeholder="e.g. Take a break"
              maxlength="80">
          </div>

          <!-- Save -->
          <button class="btn-primary reminder-save-btn" id="btnSaveReminder">
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round">
              <circle cx="7.5" cy="7.5" r="6" />
              <polyline points="7.5 4.5 7.5 7.5 9.5 9" />
            </svg>
            Save Reminder
          </button>

          <p class="reminder-form-note" id="reminderFormNote" hidden></p>

        </div>
      </div>

      <!-- ── Reminder list ──────────────────────────────────── -->
      <div class="panel reminder-list-panel">
        <div class="reminder-list-header">
          <div>
            <p class="eyebrow">Scheduled</p>
            <h3>Your reminders</h3>
          </div>
          <span class="distraction-badge" id="reminderCount" hidden>0</span>
        </div>
        <div id="reminderList"></div>
      </div>

    </div>
  </main>

  <script src="{{ url_for('static', filename='reminders.js') }}"></script>
</body>

</html>
